# Template: future-state routing policy inspired by multi-model router patterns.
# This file is not yet wired into the running application.

model_groups:
  - name: fast_triage
    candidates:
      - provider: openrouter
        model: google/gemini-2.0-flash
      - provider: openai
        model: gpt-4.1-mini
    strategy: latency_based
    fallbacks:
      on_error:
        - provider: openrouter
          model: meta-llama/llama-3.1-70b-instruct

  - name: deep_reasoning
    candidates:
      - provider: openai
        model: gpt-5.2
    strategy: weighted_pick